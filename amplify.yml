version: 1
frontend:
  phases:
    preBuild:
      commands:
        # - nvm use $VERSION_NODE_22 # This is not needed because Amplify will use the version specified in package.json or maybe .nvmrc
        - npm ci
    build:
      commands:
        # - nvm use $VERSION_NODE_22
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
